<!DOCTYPE html>
<html lang="ko">
<head>
    <title>써니 리다이렉션 관리</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6; color: #333;
            background: linear-gradient(135deg, #FFE5EC 0%, #FFF0F5 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.1); margin-bottom: 30px; text-align: center;
        }
        h1 { color: #FF69B4; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.2em; }
        .info-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .info-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.08); text-align: center; transition: transform 0.3s ease;
        }
        .info-card:hover { transform: translateY(-5px); box-shadow: 0 5px 25px rgba(255, 105, 180, 0.2); }
        .info-card h3 { color: #FF69B4; margin-bottom: 10px; }
        .info-card .value { font-size: 2em; font-weight: bold; color: #333; }
        .search-box {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.08); margin-bottom: 30px;
        }
        #searchInput {
            width: 100%; padding: 15px 20px; font-size: 1.1em;
            border: 2px solid #FFE5EC; border-radius: 50px; outline: none; transition: border-color 0.3s ease;
        }
        #searchInput:focus { border-color: #FF69B4; }
        .products-container {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #FF69B4; color: white; padding: 15px; text-align: left; font-weight: 600; }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        tr:hover { background: #FFF0F5; }
        .url { font-family: 'Courier New', monospace; font-size: 0.9em; color: #666; word-break: break-all; line-height: 1.4; }
        .copy-btn {
            background: #FF69B4; color: white; border: none; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-size: 0.9em; transition: all 0.3s ease; margin-top: 8px;
        }
        .copy-btn:hover { background: #FF1493; transform: scale(1.05); }
        .loading { text-align: center; padding: 50px; color: #FF69B4; }
        .error { background: #FFE5EC; color: #D8000C; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center; }
        .footer { text-align: center; margin-top: 50px; color: #666; font-size: 0.9em; }
        .status-good { color: #4CAF50; font-weight: bold; }
        .status-warning { color: #FF9800; font-weight: bold; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 2em; }
            table { font-size: 0.9em; }
            .copy-btn { padding: 6px 12px; font-size: 0.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 써니 리다이렉션 서비스</h1>
            <p class="subtitle">제품 링크 관리 대시보드</p>
        </div>
        
        <div class="info-cards">
            <div class="info-card">
                <h3>📊 등록된 제품</h3>
                <div class="value" id="productCount">-</div>
            </div>
            <div class="info-card">
                <h3>🕐 마지막 업데이트</h3>
                <div class="value" id="lastUpdate">-</div>
            </div>
            <div class="info-card">
                <h3>✅ 서비스 상태</h3>
                <div class="value" id="serviceStatus">확인 중...</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 제품명 검색..." onkeyup="filterTable()">
        </div>
        
        <div class="products-container">
            <div id="loadingMessage" class="loading">
                <p>데이터를 불러오는 중입니다...</p>
            </div>
            <div id="errorMessage" class="error" style="display: none;"></div>
            <table id="productTable" style="display: none;">
                <thead>
                    <tr>
                        <th style="width: 20%;">제품명</th>
                        <th style="width: 25%;">고정 URL (인포크용)</th>
                        <th style="width: 40%;">리다이렉션 원본 URL</th>
                        <th style="width: 15%;">최근 갱신</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>💕 Made with love by Sunnie • 자동 업데이트 시스템</p>
        </div>
    </div>
    
    <script>
        let allProducts = [];
        const domain = window.location.hostname;
        
        window.addEventListener('DOMContentLoaded', loadProducts);
        
        async function loadProducts() {
            try {
                const response = await fetch('https://link.sunniecode.com/api/list');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (data.products) {
                    updateDashboard(data.products, data.metadata);
                } else {
                    showError('데이터 형식이 올바르지 않습니다.');
                }
            } catch (error) {
                console.error('Error loading products:', error);
                showError('데이터를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            }
        }
        
        function updateDashboard(products, metadata) {
            document.getElementById('productCount').textContent = Object.keys(products).length;
            
            if (metadata && metadata.last_updated_date) {
                const date = new Date(metadata.last_updated_date);
                const timeAgo = getTimeAgo(date);
                
                if (isNaN(date.getTime())) {
                    document.getElementById('lastUpdate').textContent = metadata.last_updated_date;
                } else {
                    document.getElementById('lastUpdate').textContent = timeAgo;
                }
                
                const hoursSinceUpdate = metadata.last_updated ? ((Date.now() - metadata.last_updated) / (1000 * 60 * 60)) : 0;
                const statusEl = document.getElementById('serviceStatus');
                if (hoursSinceUpdate < 24) {
                    statusEl.innerHTML = '<span class="status-good">정상</span>';
                } else {
                    statusEl.innerHTML = '<span class="status-warning">확인 필요</span>';
                }
            }
            
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = '';
            allProducts = [];
            
            let mainRowHtml = ''; // 메인 링크를 따로 빼두기 위한 변수
            
            // 1. 데이터 분류 (메인 링크 vs 일반 상품)
            for (const [key, product] of Object.entries(products)) {
                const fixedUrl = `https://${domain}/${key}`;
                const redirectUrl = typeof product === 'string' ? product : (product.url || product);
                const productName = typeof product === 'object' ? (product.display_name || product.original_name || key) : key;
                const rawUpdatedAt = (typeof product === 'object' && product.updated_at) ? product.updated_at : '';
                
                // ⭐ 메인 링크일 경우 특별 대우 (배경색, 글자색, 테두리 강조)
                if (key === 'main') {
                    const displayDate = rawUpdatedAt ? rawUpdatedAt : '<span style="color:#999;font-size:0.9em;">기록 없음</span>';
                    mainRowHtml = `
                        <tr style="background-color: #FFF4FA; border-bottom: 2px solid #FF1493;">
                            <td style="font-weight: 800; color: #E83E8C; font-size: 1.1em;">
                                👑 ${productName}
                            </td>
                            <td>
                                <div class="url" id="url_${key}" style="color: #E83E8C; font-weight: 900; font-size: 1.1em;">${fixedUrl}</div>
                                <button class="copy-btn" onclick="copyUrl('${key}', this)" style="background:#E83E8C; font-weight:bold; padding:10px 20px;">주소 복사</button>
                            </td>
                            <td class="url" style="font-size: 0.85em; color: #555; max-width: 300px; word-break: break-all;">
                                ${redirectUrl}
                            </td>
                            <td style="color: #e74c3c; font-weight: bold; font-size: 0.95em;">
                                ${displayDate}
                            </td>
                        </tr>
                    `;
                } else {
                    allProducts.push({ key, productName, fixedUrl, redirectUrl, updatedAt: rawUpdatedAt });
                }
            }
            
            // 2. 일반 상품들만 최신 업데이트 순으로 정렬
            allProducts.sort((a, b) => {
                let dateA = a.updatedAt || "00/00/00 00:00";
                let dateB = b.updatedAt || "00/00/00 00:00";
                return dateB.localeCompare(dateA); 
            });
            
            // ⭐ 3. 화면에 그리기 (메인 링크를 무조건 1등으로 추가)
            if (mainRowHtml !== '') {
                tbody.innerHTML += mainRowHtml;
            }
            
            // 4. 나머지 정렬된 상품들 추가
            allProducts.forEach(item => {
                const row = document.createElement('tr');
                const displayDate = item.updatedAt ? item.updatedAt : '<span style="color:#999;font-size:0.9em;">기록 없음</span>';
                
                row.innerHTML = `
                    <td style="font-weight: 600; color: #333;">${item.productName}</td>
                    <td>
                        <div class="url" id="url_${item.key}" style="color: #FF69B4; font-weight: bold; font-size: 1em;">${item.fixedUrl}</div>
                        <button class="copy-btn" onclick="copyUrl('${item.key}', this)">주소 복사</button>
                    </td>
                    <td class="url" style="font-size: 0.85em; color: #666; max-width: 300px;">
                        ${item.redirectUrl}
                    </td>
                    <td style="color: #e74c3c; font-weight: bold; font-size: 0.95em;">
                        ${displayDate}
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('productTable').style.display = 'table';
        }
        
        function getTimeAgo(date) {
            const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
            if (seconds < 60) return '방금 전';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}분 전`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}시간 전`;
            return `${Math.floor(seconds / 86400)}일 전`;
        }
        
        // 버튼 자기 자신(btnElement)을 받아서 색깔이 바뀌도록 수정
        function copyUrl(key, btnElement) {
            const urlElement = document.getElementById(`url_${key}`);
            if (!urlElement) return;
            navigator.clipboard.writeText(urlElement.textContent).then(() => {
                const originalText = btnElement.textContent;
                const originalBg = btnElement.style.background;
                
                btnElement.textContent = '✓ 복사완료';
                btnElement.style.background = '#4CAF50';
                
                setTimeout(() => {
                    btnElement.textContent = originalText;
                    btnElement.style.background = originalBg !== '' ? originalBg : '#FF69B4';
                }, 2000);
            }).catch(err => alert('복사 실패: ' + err));
        }
        
        function filterTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const tbody = document.getElementById('productTableBody');
            const rows = tbody.getElementsByTagName('tr');
            
            for (let row of rows) {
                const productName = row.cells[0].textContent.toLowerCase();
                if (productName.includes(filter)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }
        
        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</body>
</html>
